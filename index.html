<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Secret @ Costco Store Locator 🛒</title>
    <link rel="icon" href="./favicon.png" type="image/png">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; overflow-x: hidden; }
        
        .wrapper { display: flex; height: 100vh; }

        .left-banner {
            flex: 4;
            background-image: url('./banner.png');
            background-size: cover;
            background-position: center;
            background-color: #f4f4f4;
        }

        .right-content {
            flex: 6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: #ffffff;
        }

        .container { width: 100%; max-width: 450px; }
        
        h1 { color: #005691; margin-bottom: 40px; font-size: 32px; text-align: center; font-weight: 800; letter-spacing: -0.5px; }
        
        #search-box { display: flex; gap: 10px; margin-bottom: 25px; width: 100%; }
        
        input { 
            flex: 1; padding: 18px; 
            border: 1px solid #ddd; border-radius: 12px; 
            font-size: 16px; outline: none; background-color: #f9f9f9;
            transition: all 0.3s;
        }
        input:focus { border-color: #005691; background-color: #fff; box-shadow: 0 0 0 4px rgba(0,86,145,0.1); }

        button { 
            padding: 15px 30px; background-color: #e31d2b; 
            color: white; border: none; border-radius: 12px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px;
        }
        button:hover { background-color: #c41925; transform: translateY(-1px); }

        #resultArea { 
            text-align: left; width: 100%; 
            max-height: 450px; overflow-y: auto;
            margin-top: 10px;
        }
        
        .store-item { 
            padding: 20px; border-bottom: 1px solid #eee; 
            transition: background 0.2s; border-radius: 12px;
        }
        .store-item:hover { background-color: #f8f9fa; }
        .store-whs { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1.2px; font-weight: bold; }
        .store-name { font-size: 18px; font-weight: 700; margin-top: 6px; color: #005691; display: block; text-decoration: none; }
        .no-data { padding: 60px 20px; color: #aaa; text-align: center; border: 2px dashed #eee; border-radius: 20px; font-size: 15px; }

        @media (max-width: 900px) {
            .wrapper { flex-direction: column; height: auto; }
            .left-banner { height: 400px; width: 100%; }
            .right-content { padding: 50px 25px; width: 100%; box-sizing: border-box; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="left-banner"></div>

    <div class="right-content">
        <div class="container">
            <h1>Costco Store Locator</h1>

            <div id="search-box">
                <input type="text" id="searchInput" placeholder="Enter City or State (e.g. CA)">
                <button onclick="searchStore()">Search</button>
            </div>

            <div id="resultArea">
    <div style="text-align: center; padding: 40px 20px; color: #666; border: 1px dashed #eee; border-radius: 15px; margin-top: 20px;">
        <p style="font-size: 18px; font-weight: bold; color: #005691; margin-bottom: 10px;">
            Ready to find your store? 🛒
        </p>
        <p style="font-size: 14px; line-height: 1.6; color: #888;">
            Enter your <b>City</b> or <b>State code</b> (e.g., CA, TX, NY)<br>
            to see all Costco locations featuring K-Secret.
        </p>
    </div>
</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script>
    const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjHh7c67-QQT9fKN2ZV5E2jsF7Ge2NpC3hMEc9b-xiRxZuUBJ32ttrC7vpMxv5aNqTVHqYsJ4VMFTV/pub?gid=0&single=true&output=csv'; 
    let storeData = [];

    window.onload = function() {
        if (!sheetCsvUrl.includes('docs.google.com')) return;
        Papa.parse(sheetCsvUrl, {
            download: true, header: true,
            complete: function(results) {
                storeData = results.data;
            }
        });
    };

    function searchStore() {
        const query = document.getElementById('searchInput').value.trim().toUpperCase();
        const resultArea = document.getElementById('resultArea');
        resultArea.innerHTML = '';

        if (!query) return;

        const filtered = storeData.filter(store => {
            const name = store['WHS NAME'] ? store['WHS NAME'].toUpperCase() : '';
            return name.includes(query);
        });

        if (filtered.length > 0) {
            filtered.forEach(store => {
                const item = document.createElement('div');
                item.className = 'store-item';
                const mapLink = `https://www.google.com/maps/search/Costco+${encodeURIComponent(store['WHS NAME'])}`;
                item.innerHTML = `
                    <div class="store-whs">WHS #${store['WHS']}</div>
                    <a href="${mapLink}" target="_blank" style="text-decoration:none;">
                        <div class="store-name">
                            ${store['WHS NAME']} 📍
                        </div>
                    </a>
                `;
                resultArea.appendChild(item);
            });
        } else {
            resultArea.innerHTML = '<div class="no-data">No data found for this location.</div>';
        }
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchStore(); });
</script>

</body>
</html>
